# Site settings
title: Ada Fang
description: >-
  Ada Fang — PhD candidate at Harvard, researching machine learning for biology and drug discovery. Kempner Institute Fellow.
url: https://ada-f.github.io # update to your custom domain once set up, e.g. https://adafang.com
baseurl: ""
lang: en

# Social
twitter: AdaFang_
linkedin: ada--fang
google_scholar_id: f40sqL8AAAAJ&hl

# Build
markdown: kramdown
kramdown:
  input: GFM

include: ["_pages"]
exclude:
  - bin
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - docker-compose.yml
  - Dockerfile
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - vendor
  - node_modules
  - inspiration

keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-feed

sass:
  style: compressed

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

# Jekyll Scholar
scholar:
  last_name: [Fang]
  first_name: [Ada]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_link: Details
  query: "@*"
  group_by: year
  group_order: descending
